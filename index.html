<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kommer snart</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-950 text-white min-h-screen flex items-center justify-center">
    <div class="text-center px-6">
      <h1 class="text-5xl font-bold mb-4">Något stort är på väg 🚀</h1>
      <p class="text-gray-400 text-xl mb-8">Vi lanserar snart. Var först att få veta!</p>
      <input
        type="email"
        placeholder="Din e-postadress"
        class="px-4 py-3 rounded-lg text-gray-900 w-72 mr-2"
      />
      <button class="bg-white text-gray-900 px-6 py-3 rounded-lg font-semibold hover:bg-gray-200">
        Meddela mig
      </button>
    </div>
  </body>
</html>
